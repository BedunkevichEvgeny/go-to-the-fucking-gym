spring.application.name=workout-tracker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:gymtracker;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.h2.console.enabled=true

management.endpoints.web.exposure.include=health,info
logging.level.com.gymtracker=INFO
logging.level.org.springframework.web=INFO

# CORS: comma-separated origins allowed to call the API (override with CORS_ALLOWED_ORIGINS env var)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

app.security.users.user1.id=11111111-1111-1111-1111-111111111111
app.security.users.user1.password=password1
app.security.users.user1.preferred-weight-unit=KG
app.security.users.user2.id=22222222-2222-2222-2222-222222222222
app.security.users.user2.password=password2
app.security.users.user2.preferred-weight-unit=LBS

# Azure OpenAI configuration used by LangChainSessionProcessor
# Environment variables: AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY, AZURE_OPENAI_DEPLOYMENT
azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT:https://ai-proxy.lab.epam.com}
azure.openai.api-key=${AZURE_OPENAI_API_KEY}
azure.openai.deployment=${AZURE_OPENAI_DEPLOYMENT:gpt-4.1-2025-04-14}
# Onboarding AI configuration (LangChain4j + Azure OpenAI)
onboarding.azure-openai.endpoint=${AZURE_OPENAI_ENDPOINT:https://ai-proxy.lab.epam.com}
onboarding.azure-openai.api-key=${AZURE_OPENAI_API_KEY}
onboarding.azure-openai.deployment=${AZURE_OPENAI_DEPLOYMENT:gpt-4.1-2025-04-14}
ai.handoff.timeout-seconds=${AI_HANDOFF_TIMEOUT_SECONDS:30}
ai.handoff.max-attempts=${AI_HANDOFF_MAX_ATTEMPTS:3}

