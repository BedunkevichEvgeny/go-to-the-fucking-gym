name: Test Pipeline

on:
  pull_request:
  workflow_dispatch:
    inputs:
      run_performance_tests:
        description: "Run non-blocking backend performance tests"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  backend:
    name: Backend - lint, tests, coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Checkstyle
        run: >-
          mvn -B -f backend/pom.xml
          org.apache.maven.plugins:maven-checkstyle-plugin:3.3.1:check
          -Dcheckstyle.config.location=checkstyle.xml

      - name: Run backend tests with coverage
        run: mvn -B -f backend/pom.xml verify

      - name: Verify backend coverage report exists
        run: test -f backend/target/site/jacoco/jacoco.xml

      - name: Upload backend coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/target/site/jacoco/
            backend/target/surefire-reports/
          if-no-files-found: warn

  frontend:
    name: Frontend - lint, tests, coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Verify frontend coverage summary exists
        run: test -f frontend/coverage/coverage-summary.json

      - name: Upload frontend coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: warn

  performance:
    name: Optional backend performance tests (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_performance_tests }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run performance tests
        run: >-
          mvn -B -f backend/pom.xml
          -Dtest=com.gymtracker.performance.PerformanceTest
          test

